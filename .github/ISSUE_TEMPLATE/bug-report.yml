name: Bug report
description: Report a reproducible OpenLoop problem
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do not include credentials, auth files, private screenshots, generated private campaign output, or customer data.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What broke?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Commands or workflow steps that reproduce the issue.
      placeholder: |
        1. npm run openloop -- ...
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: OpenLoop version or commit
      placeholder: 0.1.0 or commit SHA
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: node -v
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: shell
