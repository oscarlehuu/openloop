name: Feature request
description: Suggest a focused OpenLoop improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow gap should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: What should OpenLoop do?
    validations:
      required: true
  - type: dropdown
    id: workflow
    attributes:
      label: Workflow area
      options:
        - CLI
        - Dashboard
        - Social slides
        - App Store screenshots
        - App ads
        - Project scanner
        - Image generation
        - Other
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      description: Local-first, privacy, source-image, or compatibility constraints.
